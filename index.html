<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Flow Planner">
<title>Flow — Calendar & Planner</title>

<!-- v2.2: styles extracted to external stylesheet -->
<link rel="stylesheet" href="style.css">
</head>
<body class="screen-today">

<div id="app">
  <header>
    <!-- Calendar controls (shown only on calendar screen) -->
    <div class="nav-btns cal-only">
      <button class="icon-btn" id="prevBtn" aria-label="Previous">‹</button>
      <button class="today-btn" id="todayBtn">Today</button>
      <button class="icon-btn" id="nextBtn" aria-label="Next">›</button>
    </div>
    <div class="title-area">
      <div class="scope" id="scopeTitle">Today</div>
      <div class="sub" id="scopeSub"></div>
    </div>
    <div class="nav-btns">
      <div class="cal-only" style="display:flex;gap:4px;">
        <button class="icon-btn" id="zoomOutBtn" aria-label="Zoom out">−</button>
        <button class="icon-btn" id="zoomInBtn" aria-label="Zoom in">+</button>
      </div>
    </div>
  </header>

  <nav class="view-switcher">
    <button class="view-tab" data-view="month">Month</button>
    <button class="view-tab" data-view="week">Week</button>
    <button class="view-tab" data-view="three">3-Day</button>
    <button class="view-tab active" data-view="day">Day</button>
  </nav>

  <main id="main">
    <!-- Today screen -->
    <section class="screen active" id="screen-today"></section>

    <!-- Calendar screen (wraps sub-views) -->
    <section class="screen" id="screen-calendar" style="padding:0;overflow:hidden;position:absolute;">
      <section class="view" id="view-month"></section>
      <section class="view" id="view-week"></section>
      <section class="view" id="view-three"></section>
      <section class="view active" id="view-day"></section>
    </section>

    <!-- Goals screen -->
    <section class="screen" id="screen-goals"></section>

    <!-- Reviews screen -->
    <section class="screen" id="screen-reviews"></section>
  </main>

  <button class="fab" id="fab" aria-label="Add">+</button>
  <div class="fab-menu" id="fabMenu">
    <div class="fab-mini" id="fabAddEvent">
      <div class="fab-mini-label">Add event</div>
      <div class="fab-mini-icon event">📅</div>
    </div>
    <div class="fab-mini" id="fabAddTask">
      <div class="fab-mini-label">Add task</div>
      <div class="fab-mini-icon task">+</div>
    </div>
  </div>
  <div class="fab-overlay" id="fabOverlay"></div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="bnav-item active" data-screen="today">
      <span class="bnav-icon">☀</span>Today
    </button>
    <button class="bnav-item" data-screen="calendar">
      <span class="bnav-icon">📅</span>Calendar
    </button>
    <button class="bnav-item" data-screen="goals">
      <span class="bnav-icon">🎯</span>Goals
    </button>
    <button class="bnav-item" data-screen="reviews">
      <span class="bnav-icon">📊</span>Reviews
    </button>
  </nav>
</div>

<div class="zoom-hint" id="zoomHint"></div>

<!-- Task Modal -->
<div class="modal-backdrop" id="taskModal">
  <div class="modal" role="dialog" aria-labelledby="taskModalTitle">
    <h2 id="taskModalTitle">New Task</h2>
    <div class="field">
      <label for="taskTitle">Title</label>
      <input type="text" id="taskTitle" placeholder="What needs to be done?" autocomplete="off">
    </div>
    <div class="field">
      <label for="taskDesc">Description (optional)</label>
      <textarea id="taskDesc" placeholder="Add details…"></textarea>
    </div>
    <div class="field">
      <label for="taskDue">Due date</label>
      <input type="date" id="taskDue">
    </div>
    <div class="field">
      <label>Priority</label>
      <div class="priority-grid">
        <button class="prio-opt iu" data-prio="iu"><strong>Important & Urgent</strong>Do first</button>
        <button class="prio-opt inu" data-prio="inu"><strong>Important, Not Urgent</strong>Schedule</button>
        <button class="prio-opt uni" data-prio="uni"><strong>Urgent, Not Important</strong>Delegate</button>
        <button class="prio-opt nn" data-prio="nn"><strong>Neither</strong>Eliminate</button>
      </div>
    </div>
    <div class="field">
      <label for="taskGoal">Link to goal (optional)</label>
      <select id="taskGoal">
        <option value="">— No goal —</option>
      </select>
    </div>
    <div class="field">
      <label>Recurrence</label>
      <div class="recurrence-row">
        <select id="recType">
          <option value="none">None</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
        <span style="color:var(--text-dim); font-size:12px;">every</span>
        <input type="number" id="recInterval" min="1" value="1">
        <span id="recUnitLabel" style="color:var(--text-dim); font-size:12px;">day(s)</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="deleteTaskBtn" style="display:none;">Delete</button>
      <button class="btn btn-secondary" id="cancelTaskBtn">Cancel</button>
      <button class="btn btn-primary" id="saveTaskBtn">Save</button>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div class="modal-backdrop" id="eventModal">
  <div class="modal" role="dialog" aria-labelledby="eventModalTitle">
    <h2 id="eventModalTitle">New Event</h2>
    <div class="field">
      <label for="eventTitle">Title</label>
      <input type="text" id="eventTitle" placeholder="What's happening?" autocomplete="off">
    </div>
    <div class="field">
      <label for="eventDesc">Description (optional)</label>
      <textarea id="eventDesc" placeholder="Add details…"></textarea>
    </div>
    <div class="field">
      <label for="eventDate">Date</label>
      <input type="date" id="eventDate">
    </div>
    <div class="field-row">
      <div class="field">
        <label for="eventStart">Start time</label>
        <input type="time" id="eventStart">
      </div>
      <div class="field">
        <label for="eventEnd">End time</label>
        <input type="time" id="eventEnd">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="deleteEventBtn" style="display:none;">Delete</button>
      <button class="btn btn-secondary" id="cancelEventBtn">Cancel</button>
      <button class="btn btn-primary" id="saveEventBtn">Save</button>
    </div>
  </div>
</div>

<!-- Goal Modal -->
<div class="modal-backdrop" id="goalModal">
  <div class="modal" role="dialog" aria-labelledby="goalModalTitle">
    <h2 id="goalModalTitle">New Goal</h2>
    <div class="field">
      <label for="goalTitle">Goal title</label>
      <input type="text" id="goalTitle" placeholder="What do you want to achieve?" autocomplete="off">
    </div>
    <div class="field">
      <label for="goalDesc">Description (optional)</label>
      <textarea id="goalDesc" placeholder="Add context…"></textarea>
    </div>
    <div class="field">
      <label for="goalTarget">Target date</label>
      <input type="date" id="goalTarget">
    </div>
    <div id="goalCompleteRow" style="display:none; margin-bottom:12px;">
      <button class="btn btn-secondary" id="toggleGoalStatusBtn" style="width:100%;">Mark as completed ✓</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="deleteGoalBtn" style="display:none;">Delete</button>
      <button class="btn btn-secondary" id="cancelGoalBtn">Cancel</button>
      <button class="btn btn-primary" id="saveGoalBtn">Save</button>
    </div>
  </div>
</div>

<!-- ============ Scripts ============ -->
<!-- Supabase SDK + thin wrapper (used by future auth UI; safe to keep loaded) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<!-- v2.2: application logic extracted to external module -->
<script src="js/app.js"></script>
</body>
</html>
